<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Portfolio Admin · Content Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90' font-family='serif'>A</text></svg>" />
  <style>
    :root{
      --paper:#F4F0E9; --paper-2:#ECE6DB; --ink:#14110E; --ink-soft:#4A443C;
      --line:#DAD2C4; --accent:#FF5A36; --ok:#1F8A5B;
      --serif:"Fraunces",serif; --sans:"Inter",system-ui,sans-serif; --mono:"Space Grotesk",monospace;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:var(--sans);background:var(--paper);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased}
    a{color:inherit}
    ::selection{background:var(--accent);color:var(--paper)}

    /* Login */
    .login{min-height:100vh;display:grid;place-items:center;padding:24px}
    .login__card{width:100%;max-width:380px;background:var(--paper-2);border:1px solid var(--line);border-radius:18px;padding:38px 32px;text-align:center}
    .login__mark{display:grid;place-items:center;width:54px;height:54px;border-radius:50%;background:var(--ink);color:var(--paper);font-family:var(--serif);font-size:24px;margin:0 auto 20px}
    .login__card h1{font-family:var(--serif);font-weight:500;font-size:26px;margin-bottom:6px}
    .login__card p{color:var(--ink-soft);font-size:14px;margin-bottom:24px}
    .login__card input{width:100%;padding:14px 16px;border:1px solid var(--line);border-radius:10px;background:var(--paper);font-size:16px;font-family:var(--sans);margin-bottom:14px}
    .login__card input:focus{outline:none;border-color:var(--accent)}
    .login__err{color:var(--accent);font-size:13px;min-height:18px;margin-bottom:8px}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:13px 22px;border-radius:100px;border:0;background:var(--ink);color:var(--paper);font-family:var(--sans);font-weight:500;font-size:15px;cursor:pointer;transition:background .25s,transform .25s}
    .btn:hover{background:var(--accent);transform:translateY(-2px)}
    .btn--full{width:100%}
    .btn--ghost{background:transparent;color:var(--ink);border:1.5px solid var(--ink)}
    .btn--ghost:hover{background:var(--ink);color:var(--paper)}
    .btn--sm{padding:9px 16px;font-size:13px}

    .hidden{display:none!important}

    /* Shell */
    .topbar{position:sticky;top:0;z-index:10;display:flex;align-items:center;justify-content:space-between;gap:16px;padding:16px clamp(18px,4vw,40px);background:rgba(244,240,233,.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
    .topbar__brand{display:flex;align-items:center;gap:12px;font-family:var(--serif);font-size:19px}
    .topbar__brand span{display:grid;place-items:center;width:34px;height:34px;border-radius:50%;background:var(--ink);color:var(--paper);font-size:15px}
    .topbar__actions{display:flex;gap:10px;flex-wrap:wrap}
    .wrap{max-width:920px;margin:0 auto;padding:clamp(24px,5vw,48px) clamp(18px,4vw,40px) 80px}
    .lead{margin-bottom:32px}
    .lead h2{font-family:var(--serif);font-weight:500;font-size:clamp(26px,4vw,40px);letter-spacing:-.02em;margin-bottom:8px}
    .lead p{color:var(--ink-soft);max-width:62ch}
    .note{background:#FFF4E9;border:1px solid #F2C9A8;border-radius:12px;padding:14px 16px;font-size:13.5px;color:#7a4a25;margin:18px 0 8px}

    .group{border:1px solid var(--line);border-radius:16px;background:var(--paper-2);margin-bottom:20px;overflow:hidden}
    .group__head{display:flex;align-items:center;gap:10px;padding:16px 20px;cursor:pointer;user-select:none}
    .group__head h3{font-family:var(--mono);text-transform:uppercase;letter-spacing:2px;font-size:13px;color:var(--accent)}
    .group__head .chev{margin-left:auto;transition:transform .3s}
    .group.open .chev{transform:rotate(180deg)}
    .group__body{padding:0 20px;max-height:0;overflow:hidden;transition:max-height .35s ease,padding .35s ease}
    .group.open .group__body{padding:4px 20px 22px;max-height:2000px}
    .field{margin-bottom:16px}
    .field label{display:block;font-size:13px;font-weight:500;margin-bottom:6px}
    .field input,.field textarea{width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:10px;background:var(--paper);font-family:var(--sans);font-size:14.5px;color:var(--ink);resize:vertical}
    .field input:focus,.field textarea:focus{outline:none;border-color:var(--accent)}
    .field textarea{min-height:84px}
    .field .hint{font-size:12px;color:var(--ink-soft);margin-top:5px}

    .savebar{position:sticky;bottom:0;display:flex;align-items:center;gap:12px;justify-content:flex-end;padding:14px clamp(18px,4vw,40px);background:rgba(244,240,233,.9);backdrop-filter:blur(12px);border-top:1px solid var(--line);flex-wrap:wrap}
    .savebar .status{margin-right:auto;font-size:13px;color:var(--ok);font-family:var(--mono)}

    .toast{position:fixed;left:50%;bottom:90px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:var(--paper);padding:12px 20px;border-radius:100px;font-size:14px;opacity:0;pointer-events:none;transition:opacity .3s,transform .3s;z-index:50}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  </style>
</head>
<body>

  <!-- LOGIN -->
  <section class="login" id="loginView">
    <form class="login__card" id="loginForm">
      <div class="login__mark">A</div>
      <h1>Content Manager</h1>
      <p>Sign in to edit your portfolio content.</p>
      <input type="password" id="passcode" placeholder="Passcode" autocomplete="current-password" />
      <div class="login__err" id="loginErr"></div>
      <button type="submit" class="btn btn--full">Unlock</button>
    </form>
  </section>

  <!-- DASHBOARD -->
  <div id="dashView" class="hidden">
    <header class="topbar">
      <div class="topbar__brand"><span>A</span> Portfolio Admin</div>
      <div class="topbar__actions">
        <a class="btn btn--ghost btn--sm" href="index.html" target="_blank" rel="noopener">View site ↗</a>
        <button class="btn btn--ghost btn--sm" id="logoutBtn">Log out</button>
      </div>
    </header>

    <main class="wrap">
      <div class="lead">
        <h2>Edit your content</h2>
        <p>Update any field below and hit <strong>Save changes</strong>. Edits apply to the live site in this browser instantly. Leave a field blank to keep the built-in default.</p>
        <div class="note" id="originNote"></div>
      </div>

      <form id="contentForm"><!-- groups injected here --></form>
    </main>

    <div class="savebar">
      <span class="status" id="saveStatus"></span>
      <button class="btn btn--ghost btn--sm" id="exportBtn">Export JSON</button>
      <button class="btn btn--ghost btn--sm" id="importBtn">Import JSON</button>
      <input type="file" id="importFile" accept="application/json" class="hidden" />
      <button class="btn btn--ghost btn--sm" id="resetBtn">Reset all</button>
      <button class="btn" id="saveBtn">Save changes</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="js/content-schema.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
