<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Rounded-square frame -->
  <rect x="24" y="14" width="52" height="72" rx="13" fill="none" stroke="currentColor" stroke-width="6"/>
  <!-- Long diagonal linking both K's -->
  <line x1="37" y1="38" x2="65" y2="62" stroke="currentColor" stroke-width="7"/>
  <!-- Top-left K -->
  <rect x="31" y="26" width="6" height="24" fill="currentColor"/>
  <line x1="36" y1="38" x2="47" y2="27" stroke="currentColor" stroke-width="6"/>
  <!-- Top-right O -->
  <circle cx="61" cy="36" r="10.5" fill="currentColor"/>
  <!-- Bottom-left O -->
  <circle cx="39" cy="64" r="10.5" fill="currentColor"/>
  <!-- Bottom-right K (180°) -->
  <rect x="63" y="50" width="6" height="24" fill="currentColor"/>
  <line x1="64" y1="62" x2="53" y2="73" stroke="currentColor" stroke-width="6"/>
</svg>
